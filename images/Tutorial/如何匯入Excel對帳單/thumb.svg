<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" preserveAspectRatio="xMidYMid slice" role="img" aria-label="匯入 Excel 對帳單">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f1f1f"/>
      <stop offset="1" stop-color="#070707"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#2e8b57" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#2e8b57" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="600" height="360" fill="url(#bg)"/>
  <rect width="600" height="360" fill="url(#glow)"/>

  <g stroke="#2a2a2a" stroke-width="0.6" opacity="0.45">
    <line x1="0" y1="60" x2="600" y2="60"/>
    <line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="0" y1="180" x2="600" y2="180"/>
    <line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="100" y1="0" x2="100" y2="360"/>
    <line x1="200" y1="0" x2="200" y2="360"/>
    <line x1="300" y1="0" x2="300" y2="360"/>
    <line x1="400" y1="0" x2="400" y2="360"/>
    <line x1="500" y1="0" x2="500" y2="360"/>
  </g>

  <g transform="translate(300, 150)">
    <g transform="translate(-150, 0)">
      <rect x="-50" y="-60" width="100" height="120" rx="6" fill="#1a1a1a" stroke="#1d6f42" stroke-width="3"/>
      <rect x="-50" y="-60" width="100" height="22" fill="#1d6f42"/>
      <line x1="-50" y1="-20" x2="50" y2="-20" stroke="#1d6f42" stroke-width="1.5"/>
      <line x1="-50" y1="0" x2="50" y2="0" stroke="#1d6f42" stroke-width="1.5"/>
      <line x1="-50" y1="20" x2="50" y2="20" stroke="#1d6f42" stroke-width="1.5"/>
      <line x1="-50" y1="40" x2="50" y2="40" stroke="#1d6f42" stroke-width="1.5"/>
      <line x1="-15" y1="-30" x2="-15" y2="60" stroke="#1d6f42" stroke-width="1.5"/>
      <line x1="20" y1="-30" x2="20" y2="60" stroke="#1d6f42" stroke-width="1.5"/>
      <text x="0" y="-43" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">XLS</text>
    </g>
    <g stroke="#2e8b57" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="-70" y1="0" x2="60" y2="0"/>
      <polyline points="40,-15 60,0 40,15"/>
    </g>
    <g transform="translate(140, 0)">
      <rect x="-50" y="-60" width="100" height="120" rx="6" fill="#1a1a1a" stroke="#f77f00" stroke-width="3"/>
      <circle cx="0" cy="-20" r="20" fill="#f77f00"/>
      <text x="0" y="-15" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">SK</text>
      <line x1="-30" y1="20" x2="30" y2="20" stroke="#f77f00" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-30" y1="35" x2="30" y2="35" stroke="#f77f00" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-30" y1="50" x2="20" y2="50" stroke="#f77f00" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </g>

  <text x="300" y="290" font-family="'Microsoft JhengHei', 'PingFang TC', 'Heiti TC', 'Noto Sans TC', sans-serif" font-size="32" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="3">匯入 Excel 對帳單</text>
  <line x1="265" y1="306" x2="335" y2="306" stroke="#2e8b57" stroke-width="3" stroke-linecap="round"/>
  <text x="300" y="332" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#888888" text-anchor="middle" letter-spacing="4">IMPORT  ·  EXCEL</text>
</svg>
