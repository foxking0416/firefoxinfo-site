<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" preserveAspectRatio="xMidYMid slice" role="img" aria-label="台股 + 美股雙市場記帳">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f1f1f"/>
      <stop offset="1" stop-color="#070707"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#f77f00" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#f77f00" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="600" height="360" fill="url(#bg)"/>
  <rect width="600" height="360" fill="url(#glow)"/>

  <g stroke="#2a2a2a" stroke-width="0.6" opacity="0.45">
    <line x1="0" y1="60" x2="600" y2="60"/>
    <line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="0" y1="180" x2="600" y2="180"/>
    <line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="100" y1="0" x2="100" y2="360"/>
    <line x1="200" y1="0" x2="200" y2="360"/>
    <line x1="300" y1="0" x2="300" y2="360"/>
    <line x1="400" y1="0" x2="400" y2="360"/>
    <line x1="500" y1="0" x2="500" y2="360"/>
  </g>

  <g transform="translate(458, 24)">
    <rect width="118" height="30" rx="15" fill="#f77f00"/>
    <text x="59" y="20" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="1">v3.2.0  NEW</text>
  </g>

  <g transform="translate(300, 150)">
    <!-- TW pill (red up) -->
    <g transform="translate(-140, -32)">
      <rect width="130" height="64" rx="10" fill="#1a1a1a" stroke="#d9534f" stroke-width="3"/>
      <text x="20" y="40" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="800" fill="#d9534f" text-anchor="middle">TW</text>
      <g transform="translate(78, 32)" stroke="#d9534f" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <line x1="0" y1="14" x2="0" y2="-14"/>
        <polyline points="-10,-4 0,-14 10,-4"/>
      </g>
    </g>
    <!-- US pill (green up) -->
    <g transform="translate(10, -32)">
      <rect width="130" height="64" rx="10" fill="#1a1a1a" stroke="#2e8b57" stroke-width="3"/>
      <text x="20" y="40" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="800" fill="#2e8b57" text-anchor="middle">US</text>
      <g transform="translate(78, 32)" stroke="#2e8b57" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <line x1="0" y1="14" x2="0" y2="-14"/>
        <polyline points="-10,-4 0,-14 10,-4"/>
      </g>
    </g>
    <text x="-75" y="62" font-family="'Microsoft JhengHei', 'PingFang TC', sans-serif" font-size="13" fill="#888" text-anchor="middle">紅漲綠跌</text>
    <text x="75" y="62" font-family="'Microsoft JhengHei', 'PingFang TC', sans-serif" font-size="13" fill="#888" text-anchor="middle">綠漲紅跌</text>
  </g>

  <text x="300" y="290" font-family="'Microsoft JhengHei', 'PingFang TC', 'Heiti TC', 'Noto Sans TC', sans-serif" font-size="32" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="3">台股 + 美股</text>
  <line x1="265" y1="306" x2="335" y2="306" stroke="#f77f00" stroke-width="3" stroke-linecap="round"/>
  <text x="300" y="332" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#888888" text-anchor="middle" letter-spacing="4">DUAL MARKET  &#183;  TW + US</text>
</svg>
