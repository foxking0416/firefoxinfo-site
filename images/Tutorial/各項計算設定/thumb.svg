<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" preserveAspectRatio="xMidYMid slice" role="img" aria-label="各項計算設定">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f1f1f"/>
      <stop offset="1" stop-color="#070707"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#f77f00" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#f77f00" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="600" height="360" fill="url(#bg)"/>
  <rect width="600" height="360" fill="url(#glow)"/>

  <g stroke="#2a2a2a" stroke-width="0.6" opacity="0.45">
    <line x1="0" y1="60" x2="600" y2="60"/>
    <line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="0" y1="180" x2="600" y2="180"/>
    <line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="100" y1="0" x2="100" y2="360"/>
    <line x1="200" y1="0" x2="200" y2="360"/>
    <line x1="300" y1="0" x2="300" y2="360"/>
    <line x1="400" y1="0" x2="400" y2="360"/>
    <line x1="500" y1="0" x2="500" y2="360"/>
  </g>

  <g transform="translate(300, 150)">
    <rect x="-65" y="-75" width="130" height="150" rx="10" fill="#1a1a1a" stroke="#f77f00" stroke-width="4"/>
    <rect x="-50" y="-60" width="100" height="32" rx="4" fill="none" stroke="#f77f00" stroke-width="2"/>
    <text x="42" y="-37" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#f77f00" text-anchor="end">12,345</text>
    <g fill="#f77f00">
      <circle cx="-32" cy="-5" r="6"/>
      <circle cx="0" cy="-5" r="6"/>
      <circle cx="32" cy="-5" r="6"/>
      <circle cx="-32" cy="20" r="6"/>
      <circle cx="0" cy="20" r="6"/>
      <circle cx="32" cy="20" r="6"/>
      <circle cx="-32" cy="45" r="6"/>
      <circle cx="0" cy="45" r="6"/>
      <circle cx="32" cy="45" r="6"/>
    </g>
    <g transform="translate(60, -75)">
      <circle cx="0" cy="0" r="22" fill="#f77f00"/>
      <circle cx="0" cy="0" r="8" fill="#1a1a1a"/>
      <g fill="#f77f00">
        <rect x="-3" y="-26" width="6" height="8"/>
        <rect x="-3" y="18" width="6" height="8"/>
        <rect x="-26" y="-3" width="8" height="6"/>
        <rect x="18" y="-3" width="8" height="6"/>
      </g>
    </g>
  </g>

  <text x="300" y="290" font-family="'Microsoft JhengHei', 'PingFang TC', 'Heiti TC', 'Noto Sans TC', sans-serif" font-size="32" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="3">各項計算設定</text>
  <line x1="265" y1="306" x2="335" y2="306" stroke="#f77f00" stroke-width="3" stroke-linecap="round"/>
  <text x="300" y="332" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#888888" text-anchor="middle" letter-spacing="4">CALCULATION  ·  CONFIG</text>
</svg>
