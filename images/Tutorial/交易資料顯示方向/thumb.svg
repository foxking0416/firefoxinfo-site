<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" preserveAspectRatio="xMidYMid slice" role="img" aria-label="交易資料顯示方向">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f1f1f"/>
      <stop offset="1" stop-color="#070707"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#2e8b57" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#2e8b57" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="600" height="360" fill="url(#bg)"/>
  <rect width="600" height="360" fill="url(#glow)"/>

  <g stroke="#2a2a2a" stroke-width="0.6" opacity="0.45">
    <line x1="0" y1="60" x2="600" y2="60"/>
    <line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="0" y1="180" x2="600" y2="180"/>
    <line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="100" y1="0" x2="100" y2="360"/>
    <line x1="200" y1="0" x2="200" y2="360"/>
    <line x1="300" y1="0" x2="300" y2="360"/>
    <line x1="400" y1="0" x2="400" y2="360"/>
    <line x1="500" y1="0" x2="500" y2="360"/>
  </g>

  <g transform="translate(300, 150)">
    <rect x="-130" y="-65" width="260" height="130" rx="10" fill="none" stroke="#2e8b57" stroke-width="3"/>
    <line x1="-130" y1="-30" x2="130" y2="-30" stroke="#444" stroke-width="2"/>
    <line x1="-130" y1="0" x2="130" y2="0" stroke="#444" stroke-width="2"/>
    <line x1="-130" y1="30" x2="130" y2="30" stroke="#444" stroke-width="2"/>
    <text x="-110" y="-45" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="#2e8b57">最新</text>
    <text x="-110" y="-12" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#999">2026/04</text>
    <text x="-110" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#999">2026/03</text>
    <text x="-110" y="48" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#666">最舊</text>
    <g transform="translate(80, 0)" stroke="#f77f00" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <path d="M -20 -40 L -20 40" />
      <polyline points="-30,30 -20,40 -10,30" />
      <path d="M 20 -40 L 20 40" />
      <polyline points="10,-30 20,-40 30,-30" />
    </g>
  </g>

  <text x="300" y="290" font-family="'Microsoft JhengHei', 'PingFang TC', 'Heiti TC', 'Noto Sans TC', sans-serif" font-size="32" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="3">交易顯示方向</text>
  <line x1="265" y1="306" x2="335" y2="306" stroke="#2e8b57" stroke-width="3" stroke-linecap="round"/>
  <text x="300" y="332" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#888888" text-anchor="middle" letter-spacing="4">TRANSACTION  ·  ORDER</text>
</svg>
