<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" preserveAspectRatio="xMidYMid slice" role="img" aria-label="欄位顯示及順序">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f1f1f"/>
      <stop offset="1" stop-color="#070707"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#f77f00" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#f77f00" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="600" height="360" fill="url(#bg)"/>
  <rect width="600" height="360" fill="url(#glow)"/>

  <g stroke="#2a2a2a" stroke-width="0.6" opacity="0.45">
    <line x1="0" y1="60" x2="600" y2="60"/>
    <line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="0" y1="180" x2="600" y2="180"/>
    <line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="100" y1="0" x2="100" y2="360"/>
    <line x1="200" y1="0" x2="200" y2="360"/>
    <line x1="300" y1="0" x2="300" y2="360"/>
    <line x1="400" y1="0" x2="400" y2="360"/>
    <line x1="500" y1="0" x2="500" y2="360"/>
  </g>

  <g transform="translate(300, 150)">
    <g>
      <rect x="-110" y="-50" width="50" height="100" rx="6" fill="none" stroke="#f77f00" stroke-width="3"/>
      <line x1="-100" y1="-25" x2="-70" y2="-25" stroke="#f77f00" stroke-width="3" stroke-linecap="round"/>
      <line x1="-100" y1="0" x2="-70" y2="0" stroke="#666" stroke-width="3" stroke-linecap="round"/>
      <line x1="-100" y1="25" x2="-70" y2="25" stroke="#666" stroke-width="3" stroke-linecap="round"/>
    </g>
    <g transform="translate(70, 0)">
      <rect x="-30" y="-60" width="60" height="120" rx="6" fill="none" stroke="#ffffff" stroke-width="3"/>
      <line x1="-15" y1="-30" x2="15" y2="-30" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
      <line x1="-15" y1="0" x2="15" y2="0" stroke="#999" stroke-width="3" stroke-linecap="round"/>
      <line x1="-15" y1="30" x2="15" y2="30" stroke="#999" stroke-width="3" stroke-linecap="round"/>
    </g>
    <g transform="translate(160, 0)">
      <rect x="-30" y="-50" width="60" height="100" rx="6" fill="none" stroke="#666" stroke-width="3"/>
      <line x1="-15" y1="-25" x2="15" y2="-25" stroke="#666" stroke-width="3" stroke-linecap="round"/>
      <line x1="-15" y1="0" x2="15" y2="0" stroke="#666" stroke-width="3" stroke-linecap="round"/>
      <line x1="-15" y1="25" x2="15" y2="25" stroke="#666" stroke-width="3" stroke-linecap="round"/>
    </g>
    <g stroke="#f77f00" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M -10 -90 L 10 -90 M 0 -90 L 0 -75" />
      <polyline points="-7,-83 0,-90 7,-83" />
      <path d="M -10 90 L 10 90 M 0 90 L 0 75" />
      <polyline points="-7,83 0,90 7,83" />
    </g>
  </g>

  <text x="300" y="290" font-family="'Microsoft JhengHei', 'PingFang TC', 'Heiti TC', 'Noto Sans TC', sans-serif" font-size="32" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="3">欄位顯示及順序</text>
  <line x1="265" y1="306" x2="335" y2="306" stroke="#f77f00" stroke-width="3" stroke-linecap="round"/>
  <text x="300" y="332" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#888888" text-anchor="middle" letter-spacing="4">COLUMN  ·  CUSTOMIZE</text>
</svg>
