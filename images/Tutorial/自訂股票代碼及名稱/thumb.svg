<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" preserveAspectRatio="xMidYMid slice" role="img" aria-label="自訂股票代碼及名稱">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f1f1f"/>
      <stop offset="1" stop-color="#070707"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#f77f00" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#f77f00" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="600" height="360" fill="url(#bg)"/>
  <rect width="600" height="360" fill="url(#glow)"/>

  <g stroke="#2a2a2a" stroke-width="0.6" opacity="0.45">
    <line x1="0" y1="60" x2="600" y2="60"/>
    <line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="0" y1="180" x2="600" y2="180"/>
    <line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="100" y1="0" x2="100" y2="360"/>
    <line x1="200" y1="0" x2="200" y2="360"/>
    <line x1="300" y1="0" x2="300" y2="360"/>
    <line x1="400" y1="0" x2="400" y2="360"/>
    <line x1="500" y1="0" x2="500" y2="360"/>
  </g>

  <g transform="translate(300, 150)">
    <path d="M -90 -50 L 30 -50 L 90 0 L 30 50 L -90 50 Z" fill="#1a1a1a" stroke="#f77f00" stroke-width="4"/>
    <circle cx="-60" cy="0" r="10" fill="#f77f00"/>
    <text x="-30" y="-10" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">2330</text>
    <text x="-30" y="22" font-family="'Microsoft JhengHei', 'PingFang TC', sans-serif" font-size="14" fill="#999">台積電</text>
    <g transform="translate(110, -55) rotate(-25)">
      <rect x="-3" y="0" width="6" height="46" fill="#f77f00"/>
      <polygon points="-6,46 6,46 0,58" fill="#f77f00"/>
      <rect x="-3" y="-12" width="6" height="14" fill="#aaa"/>
    </g>
  </g>

  <text x="300" y="290" font-family="'Microsoft JhengHei', 'PingFang TC', 'Heiti TC', 'Noto Sans TC', sans-serif" font-size="32" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="3">自訂股票代碼</text>
  <line x1="265" y1="306" x2="335" y2="306" stroke="#f77f00" stroke-width="3" stroke-linecap="round"/>
  <text x="300" y="332" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#888888" text-anchor="middle" letter-spacing="4">CUSTOM  ·  STOCK CODE</text>
</svg>
