<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" preserveAspectRatio="xMidYMid slice" role="img" aria-label="歷史回溯">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f1f1f"/>
      <stop offset="1" stop-color="#070707"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#2e8b57" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#2e8b57" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrowhead" markerWidth="5" markerHeight="5" refX="2.5" refY="2.5" orient="auto">
      <polygon points="0,0 5,2.5 0,5" fill="#2e8b57"/>
    </marker>
  </defs>

  <rect width="600" height="360" fill="url(#bg)"/>
  <rect width="600" height="360" fill="url(#glow)"/>

  <g stroke="#2a2a2a" stroke-width="0.6" opacity="0.45">
    <line x1="0" y1="60" x2="600" y2="60"/>
    <line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="0" y1="180" x2="600" y2="180"/>
    <line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="100" y1="0" x2="100" y2="360"/>
    <line x1="200" y1="0" x2="200" y2="360"/>
    <line x1="300" y1="0" x2="300" y2="360"/>
    <line x1="400" y1="0" x2="400" y2="360"/>
    <line x1="500" y1="0" x2="500" y2="360"/>
  </g>

  <g transform="translate(458, 24)">
    <rect width="118" height="30" rx="15" fill="#f77f00"/>
    <text x="59" y="20" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="1">v3.0.0  NEW</text>
  </g>

  <g transform="translate(300, 162)">
    <path d="M 65 -25 A 85 85 0 1 0 -65 -25" stroke="#2e8b57" stroke-width="6" fill="none" stroke-linecap="round" marker-end="url(#arrowhead)"/>

    <circle cx="0" cy="0" r="55" fill="#1a1a1a" stroke="#f77f00" stroke-width="4"/>
    <g stroke="#f77f00" stroke-width="3" stroke-linecap="round">
      <line x1="0" y1="-50" x2="0" y2="-44"/>
      <line x1="50" y1="0" x2="44" y2="0"/>
      <line x1="0" y1="50" x2="0" y2="44"/>
      <line x1="-50" y1="0" x2="-44" y2="0"/>
    </g>
    <g stroke="#ffffff" stroke-linecap="round" fill="none">
      <line x1="0" y1="0" x2="-25" y2="-25" stroke-width="4"/>
      <line x1="0" y1="0" x2="-32" y2="0" stroke-width="3"/>
    </g>
    <circle cx="0" cy="0" r="4.5" fill="#ffffff"/>

    <g font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="#888888">
      <text x="-95" y="68" text-anchor="middle">2023</text>
      <text x="0" y="78" text-anchor="middle" font-size="14" fill="#f77f00">●</text>
      <text x="95" y="68" text-anchor="middle">NOW</text>
    </g>
  </g>

  <text x="300" y="290" font-family="'Microsoft JhengHei', 'PingFang TC', 'Heiti TC', 'Noto Sans TC', sans-serif" font-size="32" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="3">歷史回溯功能</text>
  <line x1="265" y1="306" x2="335" y2="306" stroke="#f77f00" stroke-width="3" stroke-linecap="round"/>
  <text x="300" y="332" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#888888" text-anchor="middle" letter-spacing="4">TIME &#183; REWIND</text>
</svg>
