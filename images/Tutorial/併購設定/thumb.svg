<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" preserveAspectRatio="xMidYMid slice" role="img" aria-label="併購設定">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f1f1f"/>
      <stop offset="1" stop-color="#070707"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#2e8b57" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#2e8b57" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="600" height="360" fill="url(#bg)"/>
  <rect width="600" height="360" fill="url(#glow)"/>

  <g stroke="#2a2a2a" stroke-width="0.6" opacity="0.45">
    <line x1="0" y1="60" x2="600" y2="60"/>
    <line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="0" y1="180" x2="600" y2="180"/>
    <line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="100" y1="0" x2="100" y2="360"/>
    <line x1="200" y1="0" x2="200" y2="360"/>
    <line x1="300" y1="0" x2="300" y2="360"/>
    <line x1="400" y1="0" x2="400" y2="360"/>
    <line x1="500" y1="0" x2="500" y2="360"/>
  </g>

  <g transform="translate(300, 150)">
    <circle cx="-65" cy="0" r="50" fill="none" stroke="#666" stroke-width="3" stroke-dasharray="6,4"/>
    <circle cx="65" cy="0" r="50" fill="none" stroke="#666" stroke-width="3" stroke-dasharray="6,4"/>
    <text x="-65" y="-58" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="#888" text-anchor="middle">A</text>
    <text x="65" y="-58" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="#888" text-anchor="middle">B</text>
    <g stroke="#2e8b57" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="-30" y1="0" x2="-12" y2="0"/>
      <polyline points="-22,-8 -12,0 -22,8"/>
      <line x1="30" y1="0" x2="12" y2="0"/>
      <polyline points="22,-8 12,0 22,8"/>
    </g>
    <g>
      <circle cx="0" cy="0" r="22" fill="#f77f00"/>
      <text x="0" y="6" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="800" fill="#fff" text-anchor="middle">A+B</text>
    </g>
    <text x="0" y="60" font-family="'Microsoft JhengHei', 'PingFang TC', sans-serif" font-size="13" fill="#2e8b57" text-anchor="middle">合併後</text>
  </g>

  <text x="300" y="290" font-family="'Microsoft JhengHei', 'PingFang TC', 'Heiti TC', 'Noto Sans TC', sans-serif" font-size="32" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="3">併購設定</text>
  <line x1="265" y1="306" x2="335" y2="306" stroke="#2e8b57" stroke-width="3" stroke-linecap="round"/>
  <text x="300" y="332" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#888888" text-anchor="middle" letter-spacing="4">MERGER  ·  ACQUISITION</text>
</svg>
